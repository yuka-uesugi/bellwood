<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページが見つかりません ｜ 有限会社ベルウッドカンパニー</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/style.css">

  <!-- 3秒後に自動的にトップページへリダイレクト -->
  <meta http-equiv="refresh" content="3;url=https://b-w-c.jp/">

  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: var(--bg-body, #fafafa);
      color: var(--text-main, #333);
      text-align: center;
    }
    .not-found-container {
      background: #fff;
      padding: 40px 32px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      max-width: 500px;
      width: 90%;
    }
    .not-found-container img {
      width: 180px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 16px;
      color: var(--primary-color, #1a3a5f);
    }
    p {
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background-color: var(--primary-color, #1a3a5f);
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 500;
      transition: opacity 0.3s;
    }
    .btn:hover {
      opacity: 0.8;
    }
    .loading-bar {
      width: 100%;
      height: 4px;
      background-color: #f0f0f0;
      border-radius: 2px;
      margin-top: 32px;
      overflow: hidden;
      position: relative;
    }
    .loading-bar::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%;
      background-color: var(--primary-color, #1a3a5f);
      animation: load 3s linear forwards;
    }
    @keyframes load {
      to { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="not-found-container">
    <img src="/bellwoodlogotouka.png" alt="BELL WOOD COMPANY">
    <h1>サイトがリニューアルされました</h1>
    <p>
      アクセスいただいたページは、ホームページのリニューアルに伴い移動・または削除されました。<br><br>
      3秒後に自動的に新しいトップページへ移動します。
    </p>
    <a href="https://b-w-c.jp/" class="btn">今すぐトップページへ</a>
    <div class="loading-bar"></div>
  </div>

</body>
</html>
