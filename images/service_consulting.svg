<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f6f9" />
      <stop offset="100%" stop-color="#e3e7ee" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628" />
      <stop offset="100%" stop-color="#162a4a" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" />
  
  <!-- Subtle dots pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="2" fill="#0a1628" opacity="0.08" />
  </pattern>
  <rect width="800" height="600" fill="url(#dots)" />

  <!-- Bar charts background -->
  <rect x="230" y="360" width="60" height="140" rx="6" fill="#0a1628" opacity="0.08" />
  <rect x="370" y="260" width="60" height="240" rx="6" fill="#0a1628" opacity="0.12" />
  <rect x="510" y="160" width="60" height="340" rx="6" fill="#0a1628" opacity="0.15" />

  <!-- Growth / Chart / Consulting Abstract -->
  <path d="M 180 430 L 260 350 L 400 380 L 540 220" fill="none" stroke="#b89650" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Data nodes points -->
  <circle cx="180" cy="430" r="14" fill="#0a1628" />
  <circle cx="260" cy="350" r="14" fill="#0a1628" />
  <circle cx="400" cy="380" r="14" fill="#0a1628" />
  
  <!-- Target / Highlight -->
  <circle cx="540" cy="220" r="20" fill="#b89650" />
  <circle cx="540" cy="220" r="32" fill="none" stroke="#0a1628" stroke-width="8" opacity="0.9" />
</svg>
