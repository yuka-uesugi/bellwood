<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f6f9" />
      <stop offset="100%" stop-color="#e3e7ee" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628" />
      <stop offset="100%" stop-color="#162a4a" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" />
  
  <!-- Subtle background grid/blueprint pattern -->
  <g stroke="#0a1628" stroke-width="1" stroke-opacity="0.08">
    <path d="M0 100 H800 M0 200 H800 M0 300 H800 M0 400 H800 M0 500 H800" />
    <path d="M100 0 V600 M200 0 V600 M300 0 V600 M400 0 V600 M500 0 V600 M600 0 V600 M700 0 V600" />
  </g>

  <!-- Large City Buildings (Real Estate Asset) -->
  <rect x="250" y="180" width="120" height="300" fill="#ffffff" opacity="0.6" stroke="url(#primary)" stroke-width="12" stroke-linejoin="round" />
  <rect x="400" y="260" width="140" height="220" fill="#ffffff" opacity="0.6" stroke="url(#primary)" stroke-width="12" stroke-linejoin="round" />
  
  <line x1="250" y1="260" x2="370" y2="260" stroke="url(#primary)" stroke-width="8" opacity="0.4" />
  <line x1="250" y1="340" x2="370" y2="340" stroke="url(#primary)" stroke-width="8" opacity="0.4" />
  <line x1="250" y1="420" x2="370" y2="420" stroke="url(#primary)" stroke-width="8" opacity="0.4" />
  
  <!-- Transaction / Growth Arrow -->
  <path d="M 180 400 C 300 400 400 200 600 200" fill="none" stroke="#b89650" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  <polyline points="520 120 620 200 520 280" fill="none" stroke="#b89650" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Value / Deal circle -->
  <circle cx="500" cy="380" r="44" fill="#ffffff" stroke="#0a1628" stroke-width="10" />
  <circle cx="500" cy="380" r="18" fill="#b89650" />
</svg>
